name: Diag SSH

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diag:
    name: Diag SSH Agent
    runs-on: [self-hosted, infra, ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inspect SSH agent / socket
        run: |
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID"
          echo "HOME=$HOME"
          ls -la "$HOME/.ssh" 2>&1 || true
          if [ -n "$SSH_AUTH_SOCK" ] && [ -S "$SSH_AUTH_SOCK" ]; then
            ssh-add -l 2>&1 || true
          else
            echo "no agent socket in env"
          fi
          echo "--- searching for agent sockets ---"
          find /home/infra -maxdepth 4 -name '*.sock' 2>/dev/null || true
          find /tmp -maxdepth 3 -name '*agent*' 2>/dev/null || true
