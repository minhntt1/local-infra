name: Terraform

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

# Force JavaScript actions (actions/checkout, etc.) to run on the runner's
# bundled Node 24 runtime instead of Node 20. See GitHub community discussion
# https://github.com/orgs/community/discussions/190988
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: [self-hosted, infra, ci]

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Terraform Fmt
        run: terraform fmt -check -recursive -diff

  terraform-plan:
    name: Terraform Plan
    runs-on: [self-hosted, infra, ci]

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
      TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Resolve Proxmox API URL
        run: |
          PROXMOX_IP=$(ip route show default | awk '{print $3}')
          echo "PM_API_URL=https://${PROXMOX_IP}:8006/api2/json" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
          TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
          TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: [self-hosted, infra, ci]
    needs: terraform-plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
      TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Resolve Proxmox API URL
        run: |
          PROXMOX_IP=$(ip route show default | awk '{print $3}')
          echo "PM_API_URL=https://${PROXMOX_IP}:8006/api2/json" >> $GITHUB_ENV

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
          TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
          TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}