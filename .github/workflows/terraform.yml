name: Terraform

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

# ---------------------------------------------------------------------------
# Node Runtime & FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
#
# The Debian nodejs / nodejs-doc / node-corepack packages were removed from the
# container. The only Node available to the runner is its bundled toolchain
# under /home/infra/actions-runner/externals/ (e.g. node24 -> v24.16.0, which
# also ships npm/npx/corepack).
#
# To make JavaScript actions (e.g. actions/checkout) execute on the runner's
# bundled Node 24 instead of Node 20, the workflow sets (per GitHub community
# discussion https://github.com/orgs/community/discussions/190988):
#
#   env:
#     FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#
# Note: the var forces Node 24 execution but does NOT silence the runner's
# Node-20 deprecation warnings (known runner bug actions/runner#4295). All
# actions are kept on their latest major (actions/checkout@v4,
# actions/upload-artifact@v4, actions/download-artifact@v4,
# hashicorp/setup-terraform@v4).
# ---------------------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency: 
  group: terraform 
  cancel-in-progress: false

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: [self-hosted, infra, ci]

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Terraform Fmt
        run: terraform fmt -check -recursive -diff

  terraform-plan:
    name: Terraform Plan
    runs-on: [self-hosted, infra, ci]

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_pm_api_username: ${{ secrets.PM_API_USERNAME }}
      TF_VAR_pm_api_password: ${{ secrets.PM_API_PASSWORD }}
      TF_VAR_ssh_public_keys: ${{ secrets.SSH_RUNNER_ANSIBLE_PUBLIC }}
      TF_VAR_ssh_pm_private_key: ${{ secrets.SSH_RUNNER_PM_PRIVATE }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Resolve Proxmox API URL
        run: |
          PROXMOX_IP=$(ip route show default | awk '{print $3}')
          echo "PROXMOX_IP=${PROXMOX_IP}" >> $GITHUB_ENV
          echo "PM_API_URL=https://${PROXMOX_IP}:8006/api2/json" >> $GITHUB_ENV

      - name: Prepare Terraform state directory
        run: |
          mkdir -p /home/infra/terraform/state

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="path=/home/infra/terraform/state/terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_host: ${{ env.PROXMOX_IP }}
          TF_VAR_pm_api_username: ${{ secrets.PM_API_USERNAME }}
          TF_VAR_pm_api_password: ${{ secrets.PM_API_PASSWORD }}
          TF_VAR_ssh_public_keys: ${{ secrets.SSH_RUNNER_ANSIBLE_PUBLIC }}
          TF_VAR_ssh_pm_private_key: ${{ secrets.SSH_RUNNER_PM_PRIVATE }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_host: ${{ env.PROXMOX_IP }}
          TF_VAR_pm_api_username: ${{ secrets.PM_API_USERNAME }}
          TF_VAR_pm_api_password: ${{ secrets.PM_API_PASSWORD }}
          TF_VAR_ssh_public_keys: ${{ secrets.SSH_RUNNER_ANSIBLE_PUBLIC }}
          TF_VAR_ssh_pm_private_key: ${{ secrets.SSH_RUNNER_PM_PRIVATE }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: [self-hosted, infra, ci]
    needs: terraform-plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_pm_api_username: ${{ secrets.PM_API_USERNAME }}
      TF_VAR_pm_api_password: ${{ secrets.PM_API_PASSWORD }}
      TF_VAR_ssh_public_keys: ${{ secrets.SSH_RUNNER_ANSIBLE_PUBLIC }}
      TF_VAR_ssh_pm_private_key: ${{ secrets.SSH_RUNNER_PM_PRIVATE }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false

      - name: Resolve Proxmox API URL
        run: |
          PROXMOX_IP=$(ip route show default | awk '{print $3}')
          echo "PROXMOX_IP=${PROXMOX_IP}" >> $GITHUB_ENV
          echo "PM_API_URL=https://${PROXMOX_IP}:8006/api2/json" >> $GITHUB_ENV

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Prepare Terraform state directory
        run: |
          mkdir -p /home/infra/terraform/state

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="path=/home/infra/terraform/state/terraform.tfstate"
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_host: ${{ env.PROXMOX_IP }}
          TF_VAR_pm_api_username: ${{ secrets.PM_API_USERNAME }}
          TF_VAR_pm_api_password: ${{ secrets.PM_API_PASSWORD }}
          TF_VAR_ssh_public_keys: ${{ secrets.SSH_RUNNER_ANSIBLE_PUBLIC }}
          TF_VAR_ssh_pm_private_key: ${{ secrets.SSH_RUNNER_PM_PRIVATE }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_pm_api_url: ${{ env.PM_API_URL }}
          TF_VAR_pm_host: ${{ env.PROXMOX_IP }}
          TF_VAR_pm_api_username: ${{ secrets.PM_API_USERNAME }}
          TF_VAR_pm_api_password: ${{ secrets.PM_API_PASSWORD }}
          TF_VAR_ssh_public_keys: ${{ secrets.SSH_RUNNER_ANSIBLE_PUBLIC }}
          TF_VAR_ssh_pm_private_key: ${{ secrets.SSH_RUNNER_PM_PRIVATE }}
