name: Ansible

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'ansible/**'
  push:
    branches:
      - main
    paths:
      - 'ansible/**'

# ---------------------------------------------------------------------------
# Node Runtime & FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
#
# The Debian nodejs / nodejs-doc / node-corepack packages were removed from the
# container. The only Node available to the runner is its bundled toolchain
# under /home/infra/actions-runner/externals/ (e.g. node24 -> v24.16.0, which
# also ships npm/npx/corepack).
#
# To make JavaScript actions (e.g. actions/checkout) execute on the runner's
# bundled Node 24 instead of Node 20, the workflow sets (per GitHub community
# discussion https://github.com/orgs/community/discussions/190988):
#
#   env:
#     FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#
# Note: the var forces Node 24 execution but does NOT silence the runner's
# Node-20 deprecation warnings (known runner bug actions/runner#4295). All
# actions are kept on their latest major (actions/checkout@v4,
# actions/upload-artifact@v4, actions/download-artifact@v4).
# ---------------------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: [self-hosted, infra, ci]

    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible & lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Install required collections
        run: ansible-galaxy collection install community.general ansible.posix

      - name: Ansible Lint
        run: ansible-lint

  ansible-apply:
    name: Ansible Apply
    runs-on: [self-hosted, infra, ci]
    needs: ansible-lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: ansible

    env:
      PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
      PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install required collections
        run: ansible-galaxy collection install community.general ansible.posix

      - name: Resolve Proxmox API URL
        run: |
          PROXMOX_IP=$(ip route show default | awk '{print $3}')
          echo "PM_API_URL=https://${PROXMOX_IP}:8006/api2/json" >> $GITHUB_ENV

      - name: Show resolved inventory
        run: ansible-inventory -i inventory/proxmox.yml --list

      - name: Ansible Playbook (k3s bootstrap)
        run: |
          ansible-playbook -i inventory/proxmox.yml playbooks/site.yml \
            --extra-vars "k3s_token=${{ secrets.K3S_TOKEN }}"
        env:
          PM_API_URL: ${{ env.PM_API_URL }}
          PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
          PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}