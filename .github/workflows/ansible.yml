name: Ansible

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'ansible/**'
  push:
    branches:
      - main
    paths:
      - 'ansible/**'

# ---------------------------------------------------------------------------
# Node Runtime & FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
#
# The Debian nodejs / nodejs-doc / node-corepack packages were removed from the
# container. The only Node available to the runner is its bundled toolchain
# under /home/infra/actions-runner/externals/ (e.g. node24 -> v24.16.0, which
# also ships npm/npx/corepack).
#
# To make JavaScript actions (e.g. actions/checkout) execute on the runner's
# bundled Node 24 instead of Node 20, the workflow sets (per GitHub community
# discussion https://github.com/orgs/community/discussions/190988):
#
#   env:
#     FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#
# Note: the var forces Node 24 execution but does NOT silence the runner's
# Node-20 deprecation warnings (known runner bug actions/runner#4295). All
# actions are kept on their latest major (actions/checkout@v4,
# actions/upload-artifact@v4, actions/download-artifact@v4).
# ---------------------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: [self-hosted, infra, ci]

    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python venv
        # The self-hosted runner (Debian LXC) ships python3 but no pip/venv.
        # Install python3 + pip + venv via apt, then create (if missing) and
        # activate a dedicated venv so pip installs never touch the system.
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y python3 python3-pip python3-venv
          python3 -m venv ~/.infra_venv
          echo "$HOME/.infra_venv/bin" >> $GITHUB_PATH

      - name: Install Ansible & lint
        run: |
          pip install --upgrade pip
          # requests is required by the community.proxmox inventory
          # plugin (used by inventory/proxmox.yml) at runtime.
          pip install ansible ansible-lint requests

      - name: Install required collections
        # community.proxmox hosts the proxmox dynamic inventory plugin
        # (community.general.proxmox was deprecated and moved there in
        # community.general 15.0.0). ansible.posix provides the mount/sysctl
        # modules used by the k3s roles.
        run: ansible-galaxy collection install community.proxmox ansible.posix

      - name: Ansible Lint
        run: ansible-lint

      - name: Cleanup apt & SSH key
        if: always()
        run: |
          sudo apt-get clean
          sudo apt-get autoremove -y
          # Remove the ephemeral runner private key written for this run.
          rm -f "$HOME/.ssh/runner_ansible"

  ansible-apply:
    name: Ansible Apply
    runs-on: [self-hosted, infra, ci]
    needs: ansible-lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: ansible

    env:
      PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
      PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python venv
        # The self-hosted runner (Debian LXC) ships python3 but no pip/venv.
        # Install python3 + pip + venv via apt, then create (if missing) and
        # activate a dedicated venv so pip installs never touch the system.
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y python3 python3-pip python3-venv
          python3 -m venv ~/.infra_venv
          echo "$HOME/.infra_venv/bin" >> $GITHUB_PATH

      - name: Install Ansible
        run: |
          pip install --upgrade pip
          # requests is required by the community.proxmox inventory
          # plugin (used by inventory/proxmox.yml) at runtime.
          pip install ansible requests

      - name: Install required collections
        # community.proxmox hosts the proxmox dynamic inventory plugin
        # (community.general.proxmox was deprecated and moved there in
        # community.general 15.0.0). ansible.posix provides the mount/sysctl
        # modules used by the k3s roles.
        run: ansible-galaxy collection install community.proxmox ansible.posix

      - name: Resolve Proxmox API URL
        # community.proxmox appends '/api2/json' to the url itself, so the
        # base URL must NOT include it (otherwise the path doubles up and the
        # API returns 501).
        run: |
          PROXMOX_IP=$(ip route show default | awk '{print $3}')
          echo "PM_API_URL=https://${PROXMOX_IP}:8006" >> $GITHUB_ENV

      - name: Install runner SSH key for Ansible
        # The previous ForwardAgent model failed in CI because no SSH agent
        # socket is available to the runner. Instead we write the runner's
        # private key (SSH_RUNNER_ANSIBLE_PRIVATE) to a file and point Ansible
        # at it via ANSIBLE_SSH_KEY_FILE. The matching public key
        # (SSH_RUNNER_ANSIBLE_PUBLIC) is injected into each VM's cloud-init by
        # Terraform, so root key-based auth succeeds. The key file is created
        # under the runner's ~/.ssh and cleaned up at the end of the job.
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.SSH_RUNNER_ANSIBLE_PRIVATE }}" > "$HOME/.ssh/runner_ansible"
          chmod 600 "$HOME/.ssh/runner_ansible"
          echo "ANSIBLE_SSH_KEY_FILE=$HOME/.ssh/runner_ansible" >> "$GITHUB_ENV"

      - name: Show resolved inventory
        run: |
          ansible-inventory -i inventory/proxmox.yml --list
          # Fail loudly if the dynamic inventory resolved no hosts, instead of
          # silently skipping every play (which would still exit 0).
          # community.proxmox lists hosts under _meta.hostvars (not directly
          # under all.hosts), so count from there and exclude implicit localhost.
          HOST_COUNT=$(ansible-inventory -i inventory/proxmox.yml --list \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(len([h for h in d.get('_meta',{}).get('hostvars',{}) if h!='localhost']))")
          echo "Resolved $HOST_COUNT non-localhost host(s)"
          if [ "$HOST_COUNT" -eq 0 ]; then
            echo "::error::Inventory resolved 0 hosts - aborting (check Proxmox API token / network)."
            exit 1
          fi

      - name: Ansible Playbook (k3s bootstrap)
        run: |
          ansible-playbook -i inventory/proxmox.yml playbooks/site.yml \
            --extra-vars "k3s_token=${{ secrets.K3S_TOKEN }}"
        env:
          PM_API_URL: ${{ env.PM_API_URL }}
          PM_API_TOKEN_ID: ${{ secrets.PM_API_TOKEN_ID }}
          PM_API_TOKEN_SECRET: ${{ secrets.PM_API_TOKEN_SECRET }}

      - name: Cleanup apt & SSH key
        if: always()
        run: |
          sudo apt-get clean
          sudo apt-get autoremove -y
          # Remove the ephemeral runner private key written for this run.
          rm -f "$HOME/.ssh/runner_ansible"
