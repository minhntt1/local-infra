---
# Install and configure a single k3s server (control-plane) on the prod VM.
# Runs escalated to root via become (the play connects as the Terraform
# cloud-init user). Idempotent: re-running only restarts the service if the
# version/args changed.

- name: Fail if node IP could not be resolved on the cluster interface
  ansible.builtin.fail:
    msg: >-
      Could not find IPv4 address on interface '{{ cluster_interface }}'.
      Check the VM's network config and the cluster_interface variable.
  when: k3s_common_node_ip is not defined or k3s_common_node_ip | length == 0

- name: Build k3s server install flags
  ansible.builtin.set_fact:
    k3s_server_install_flags: >-
      --token {{ k3s_token }}
      --flannel-backend {{ k3s_server_config.flannel_backend }}
      --cluster-cidr 10.42.0.0/16
      --service-cidr 10.43.0.0/16
      {% if k3s_disable_traefik %}--disable traefik{% endif %}
      {{ k3s_server_config.extra_args }}

- name: Install k3s server via official script
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail && curl -sfL https://get.k3s.io
      | INSTALL_K3S_VERSION={{ k3s_version }}
      INSTALL_K3S_EXEC="{{ k3s_server_install_flags }}" sh -
    creates: /usr/local/bin/k3s
    executable: /bin/bash

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for the k3s server to be ready
  ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }}
  register: k3s_server_ready
  until: k3s_server_ready.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Remove control-plane taint for single-node scheduling
  # By default k3s applies node-role.kubernetes.io/control-plane:NoSchedule
  # to the server node. In a single-node cluster with no agents, this would
  # prevent any pod from being scheduled. Removing the taint allows user
  # workloads to run on the control-plane node.
  ansible.builtin.command:
    cmd: >-
      k3s kubectl taint nodes --all
      node-role.kubernetes.io/control-plane:NoSchedule-
  register: k3s_server_taint_result
  changed_when: "'not found' not in k3s_server_taint_result.stderr"
  failed_when: k3s_server_taint_result.rc != 0 and "not found" not in k3s_server_taint_result.stderr

- name: Fetch admin kubeconfig to the Ansible controller
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ k3s_local_kubeconfig_path }}"
    flat: true

- name: Rewrite kubeconfig server address to the node hostname
  # Use the hostname instead of IP because Proxmox SDN resolves VM names to
  # their current DHCP IPs. This makes the kubeconfig immune to IP changes —
  # no playbook re-run needed when the DHCP lease changes.
  ansible.builtin.replace:
    path: "{{ k3s_local_kubeconfig_path }}"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: 'https://{{ inventory_hostname }}:6443'
  delegate_to: localhost
  become: false
