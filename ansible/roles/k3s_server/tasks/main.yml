---
# Install and configure a single k3s server (control-plane) on the prod VM.
# Runs escalated to root via become (the play connects as the Terraform
# cloud-init user). Idempotent: re-running only restarts the service if the
# version/args changed.

- name: Fail if node IP could not be resolved on the cluster interface
  ansible.builtin.fail:
    msg: >-
      Could not find IPv4 address on interface '{{ cluster_interface }}'.
      Check the VM's network config and the cluster_interface variable.
  when: k3s_common_node_ip is not defined or k3s_common_node_ip | length == 0

- name: Build k3s server install flags
  ansible.builtin.set_fact:
    k3s_server_install_flags: >-
      --token {{ k3s_token }}
      --node-ip {{ k3s_common_node_ip }}
      --advertise-address {{ k3s_common_node_ip }}
      --flannel-backend {{ k3s_server_config.flannel_backend }}
      --cluster-cidr 10.42.0.0/16
      --service-cidr 10.43.0.0/16
      {% if k3s_disable_traefik %}--disable traefik{% endif %}
      {{ k3s_server_config.extra_args }}

- name: Install k3s server via official script
  ansible.builtin.shell:
    cmd: >-
      curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }}
      INSTALL_K3S_EXEC="{{ k3s_server_install_flags }}" sh -
    creates: /usr/local/bin/k3s
    executable: /bin/bash

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for the k3s server to be ready
  ansible.builtin.command: k3s kubectl get node {{ inventory_hostname }}
  register: k3s_server_ready
  until: k3s_server_ready.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Fetch admin kubeconfig to the Ansible controller
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ k3s_local_kubeconfig_path }}"
    flat: true

- name: Rewrite kubeconfig server address to the node IP
  ansible.builtin.replace:
    path: "{{ k3s_local_kubeconfig_path }}"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: 'https://{{ k3s_common_node_ip }}:6443'
  delegate_to: localhost
  become: false
