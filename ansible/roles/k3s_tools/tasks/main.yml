---
# roles/k3s_tools/tasks/main.yml

# -----------------------------------------------------------------------------
# Install Helm CLI
# -----------------------------------------------------------------------------

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: k3s_tools_helm_bin

- name: Install Helm
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  when: not k3s_tools_helm_bin.stat.exists

- name: Verify Helm
  ansible.builtin.command: helm version --short
  register: k3s_tools_helm_version
  changed_when: false

- debug:
    var: k3s_tools_helm_version.stdout

# -----------------------------------------------------------------------------
# Install ArgoCD
# -----------------------------------------------------------------------------

- name: Add Argo Helm repository
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - add
      - argo
      - https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_repo_add
  failed_when: false
  changed_when: "'already exists' not in (k3s_tools_repo_add.stderr | default(''))"

- name: Update Helm repositories
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Install or upgrade ArgoCD
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - argocd
      - argo/argo-cd
      - --version
      - 8.3.0
      - --namespace
      - argocd
      - --create-namespace
      - --wait
      - --timeout
      - 10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_helm_install

- name: Wait for ArgoCD server rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - rollout
      - status
      - deployment/argocd-server
      - -n
      - argocd
      - --timeout=300s
  changed_when: false

- name: Show Helm releases
  ansible.builtin.command:
    argv:
      - helm
      - list
      - -A
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_releases
  changed_when: false

- debug:
    var: k3s_tools_releases.stdout
