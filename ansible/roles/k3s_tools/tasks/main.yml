---
# roles/k3s_tools/tasks/main.yml

# ---------- Helm ----------

- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: k3s_tools_helm_bin

- name: Install Helm
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: not k3s_tools_helm_bin.stat.exists
  register: k3s_tools_helm_install
  changed_when: not k3s_tools_helm_bin.stat.exists

- name: Verify Helm installation
  ansible.builtin.command:
    argv:
      - helm
      - version
      - --short
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_helm_version
  changed_when: false

- name: Display Helm version
  ansible.builtin.debug:
    var: k3s_tools_helm_version.stdout

# ---------- ArgoCD ----------

- name: Add Argo Helm repository
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - add
      - argo
      - https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_repo_add
  failed_when: false
  changed_when: "'already exists' not in k3s_tools_repo_add.stderr"

- name: Update Helm repositories
  ansible.builtin.command:
    argv:
      - helm
      - repo
      - update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Install or upgrade ArgoCD
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - argocd
      - argo/argo-cd
      - --version
      - 8.3.0
      - --namespace
      - argocd
      - --create-namespace
      - --wait
      - --timeout
      - 10m
      - --set
      - server.service.type=NodePort
      - --set
      - server.service.nodePortHttps=30808
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_helm_install_result
  changed_when: >
    'STATUS: deployed' in k3s_tools_helm_install_result.stdout or
    'STATUS: upgraded' in k3s_tools_helm_install_result.stdout or
    'Release "argocd"' in k3s_tools_helm_install_result.stdout

- name: Wait for ArgoCD pods
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - wait
      - --namespace
      - argocd
      - --for=condition=Ready
      - pods
      - --all
      - --timeout=300s
  register: k3s_tools_argocd_wait
  retries: 3
  delay: 10
  until: k3s_tools_argocd_wait.rc == 0
  changed_when: false

- name: List Helm releases
  ansible.builtin.command:
    argv:
      - helm
      - list
      - -A
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: k3s_tools_releases
  changed_when: false

- name: Display Helm releases
  ansible.builtin.debug:
    var: k3s_tools_releases.stdout
