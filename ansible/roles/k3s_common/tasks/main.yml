---
# Common prerequisites for all k3s nodes (servers + agents).
# Runs as root (inventory ansible_user=root), so no become needed.

- name: Disable swap (k3s/kubelet requirement)
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: true

- name: Ensure swap is disabled in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Load required kernel modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: Ensure required kernel modules load on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      br_netfilter
      overlay
    mode: "0644"

- name: Set required sysctl values for k8s networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward", value: "1" }

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - jq
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Optionally upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  when: k3s_apt_upgrade | bool

- name: Determine node IP on the cluster interface
  ansible.builtin.set_fact:
    k3s_node_ip: >-
      {{ ansible_facts[cluster_interface]['ipv4']['address'] }}
  when: cluster_interface in ansible_facts