# Shared variables for the entire lab k3s cluster.
#
# Secrets (k3s_token) must NOT be committed. Override at runtime with
# --extra-vars "k3s_token=..." or an Ansible vault file. A placeholder is
# provided only so the playbook is syntactically valid; the real token should
# be a random 32+ char string, e.g. `openssl rand -hex 32`.

# --- k3s release ---
k3s_version: "v1.30.4+k3s1"

# --- cluster join token (OVERRIDE, do not commit a real value) ---
k3s_token: "CHANGE_ME_TO_A_RANDOM_TOKEN"

# --- networking ---
# Guest NIC k3s binds/advertises on. The Terraform network_device block sets
# no `model`, so the bpg/proxmox provider defaults to `virtio`; the guest sees
# the first virtio NIC as `ens18` (systemd predictable name). The prod VM gets
# its DHCP address on this interface (which is bridged onto the Proxmox
# `vnet1` bridge, 10.10.0.0/24). The k3s_common role resolves the node IP from
# this interface when present in facts, and falls back to ansible_default_ipv4
# (the default-route interface) otherwise.
cluster_interface: "ens18"

# --- CNI / flannel ---
# Default k3s CNI is flannel. Set to "calico"/"cilium" to switch if desired.
k3s_cni: "flannel"

# --- optional bundled components ---
# k3s ships traefik as the default ingress. Set false to disable.
k3s_disable_traefik: false
# Other k3s defaults kept on: servicelb, local-storage, metrics-server.

# --- install / maintenance toggles ---
# Run `apt update` + upgrade before installing k3s (recommended so the node
# gets the latest kernel/modules/security patches). Set false to skip.
k3s_apt_upgrade: true
# Where to drop the fetched admin kubeconfig on the controller running Ansible.
k3s_local_kubeconfig_path: "./kubeconfig-prod.yaml"

# --- SSH connection (key-based auth) ---
# Connect as the Terraform cloud-init user (var.vm_defaults.ciuser, default
# "admin"); Terraform injects the runner's public key into THIS account's
# authorized_keys, not root. The private key is written by the workflow from
# the SSH_RUNNER_ANSIBLE_PRIVATE secret to ANSIBLE_SSH_KEY_FILE. A per-run
# known_hosts (ANSIBLE_SSH_KNOWN_HOSTS) with accept-new avoids the
# "REMOTE HOST IDENTIFICATION HAS CHANGED" failure on VM recreate.
# NOTE: these MUST live in group_vars (Jinja-evaluated), NOT in ansible.cfg
# (not Jinja-evaluated) and NOT in the community.proxmox inventory compose
# block (ignored by the plugin).
ansible_user: admin
ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_SSH_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=accept-new
  -o UserKnownHostsFile={{ lookup('env', 'ANSIBLE_SSH_KNOWN_HOSTS') | default('~/.ssh/known_hosts', true) }}
