# Proxmox dynamic inventory for the lab k3s cluster.
#
# Resolves VM IPs at runtime from the Proxmox API (same token Terraform uses),
# so we never hardcode the DHCP-assigned addresses on bridge vnet1. The QEMU
# guest agent must be running on the VM (it is: terraform/main.tf sets
# agent.enabled = true) so the API can report the current IPv4 address.
#
# Auth: uses the same Proxmox API token as Terraform (admin@pve!terraform).
# DO NOT commit the secret. Provide it via environment variables (see below)
# or an Ansible vault file. The token ID/secret mirror terraform.tfvars:
#   PM_API_TOKEN_ID=admin@pve!terraform
#   PM_API_TOKEN_SECRET=<secret>
#   PM_API_URL=https://<proxmox-ip>:8006/api2/json
#
# Run with:
#   PM_API_URL=... PM_API_TOKEN_ID=... PM_API_TOKEN_SECRET=... \
#     ansible-inventory -i inventory/proxmox.yml --list
#
# Topology: VMID 200 (prod) -> k3s_servers; VMID 201 (dev) is left out of
# k3s_agents for now (powered off in Terraform) but is easy to enable later.

plugin: community.proxmox.proxmox
url: "{{ lookup('env', 'PM_API_URL') }}"
# community.proxmox splits the API token into user (before '!') and
# token_id (after '!'). PM_API_TOKEN_ID holds the full "user!token" value,
# so we split it here.
user: "{{ lookup('env', 'PM_API_TOKEN_ID').split('!')[0] }}"
token_id: "{{ lookup('env', 'PM_API_TOKEN_ID').split('!')[1] }}"
token_secret: "{{ lookup('env', 'PM_API_TOKEN_SECRET') }}"
validate_certs: false
# Only manage the single Proxmox node used by Terraform (variables.tf target_node).
nodes:
  - hp
# Group VMs by our own labels instead of Proxmox tags.
# community.proxmox exposes the VMID as 'proxmox_vmid' (not 'vmid').
groups:
  k3s_servers: "proxmox_vmid | string == '200'"
  # Future workers: uncomment to include the dev VM (201) as an agent.
  # k3s_agents: "proxmox_vmid | string == '201'"
# Compose a stable ansible_host from the guest agent's first IPv4 on vnet1.
# The guest agent reports addresses per interface; we take the first IPv4.
compose:
  ansible_host: >-
    (guest_agent_info.networks | default([])
      | selectattr('ip-address-type', 'eq', 'ipv4')
      | map(attribute='ip-address') | list | first)
  cluster_node: name
# Connect as the Terraform cloud-init user (var.vm_defaults.ciuser, default
# "admin"). Terraform injects the runner's SSH public key into THIS account's
# authorized_keys, not into root, so we log in as this user and escalate with
# become (configured in ansible.cfg). The private key path comes from
# ANSIBLE_SSH_KEY_FILE, set in the workflow from the SSH_RUNNER_ANSIBLE_PRIVATE
# secret. This replaces the old ForwardAgent model, which had no agent socket
# available in CI.
ansible_user: admin
ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_SSH_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"
