[defaults]
# Default inventory for the lab: Proxmox dynamic inventory that resolves
# DHCP IPs at runtime (no hardcoded addresses). Override per-run with -i <path>.
inventory = inventory/proxmox.yml
# Connect as the Terraform cloud-init user (var.vm_defaults.ciuser, default
# "admin"). Terraform injects the runner's SSH public key into THIS account's
# authorized_keys, not into root, so Ansible must log in as this user and then
# escalate with become. The private key is written to a file at runtime from the
# SSH_RUNNER_ANSIBLE_PRIVATE secret and referenced via the ANSIBLE_SSH_KEY_FILE
# env var (see .github/workflows/ansible.yml). This replaces the previous
# ForwardAgent model, which had no agent socket in CI.
remote_user = admin
# Escalate to root for privileged tasks (the ciuser has passwordless sudo via
# cloud-init). The k3s roles assume they run as root, so become is required.
become = true
become_method = sudo
become_user = root
# Retry failed connections a few times (cloud-init may not be ready immediately).
timeout = 30
retries = 3
# Don't pollute the repo with .retry files.
retry_files_enabled = false
# Use the hashed host key policy to avoid first-connect prompts in automation.
host_key_checking = false
# Prefer the bundled collection/role paths.
collections_path = ./collections
roles_path = ./roles

[ssh_connection]
# Use the runner's SSH private key file directly (no agent forwarding). The key
# path is supplied via ANSIBLE_SSH_KEY_FILE (set in the workflow from the
# SSH_RUNNER_ANSIBLE_PRIVATE secret). ControlPersist keeps connections warm.
# A per-run known_hosts (ANSIBLE_SSH_KNOWN_HOSTS, set in the workflow) with
# StrictHostKeyChecking=accept-new avoids the "REMOTE HOST IDENTIFICATION HAS
# CHANGED" failure that occurs when a VM is recreated and gets a new host key
# but an old entry lingers in the runner's ~/.ssh/known_hosts.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile="{{ lookup('env', 'ANSIBLE_SSH_KNOWN_HOSTS') | default('~/.ssh/known_hosts', true) }}"
pipelining = true
# Path to the private key used for root SSH into the guests. Override per-run
# with the ANSIBLE_SSH_KEY_FILE env var; defaults to the runner's id_ed25519.
private_key_file = {{ lookup('env', 'ANSIBLE_SSH_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}
