[defaults]
# Default inventory for the lab: Proxmox dynamic inventory that resolves
# DHCP IPs at runtime (no hardcoded addresses). Override per-run with -i <path>.
inventory = inventory/proxmox.yml
# Connect as root via SSH agent, matching the Terraform provider
# (terraform/providers.tf -> ssh { agent = true, username = "root" }).
remote_user = root
# Retry failed connections a few times (cloud-init may not be ready immediately).
timeout = 30
retries = 3
# Don't pollute the repo with .retry files.
retry_files_enabled = false
# Use the hashed host key policy to avoid first-connect prompts in automation.
host_key_checking = false
# Prefer the bundled collection/role paths.
collections_path = ./collections
roles_path = ./roles

[ssh_connection]
# Forward the local SSH agent so key-based auth to the VM works without
# embedding keys in the repo. Requires SSH_AUTH_SOCK to be set in the env.
ssh_args = -o ForwardAgent=yes -o ControlMaster=auto -o ControlPersist=60s
pipelining = true