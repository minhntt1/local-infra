[defaults]
# Default inventory for the lab: the `inventory/` directory holds the Proxmox
# dynamic inventory plugin (proxmox.yml) AND inventory/group_vars/all.yml.
# Pointing at the DIRECTORY (not the single proxmox.yml file) is required so
# Ansible auto-loads inventory/group_vars/all.yml — group_vars/host_vars are
# only loaded when the inventory source is a directory, not a single file.
# Override per-run with -i <path>.
inventory = inventory
# Connect as the Terraform cloud-init user (var.vm_defaults.ciuser, default
# "admin"). Terraform injects the runner's SSH public key into THIS account's
# authorized_keys, not into root, so Ansible must log in as this user and then
# escalate with become. The private key is written to a file at runtime from the
# SSH_RUNNER_ANSIBLE_PRIVATE secret and referenced via the ANSIBLE_SSH_KEY_FILE
# env var (see .github/workflows/ansible.yml). This replaces the previous
# ForwardAgent model, which had no agent socket in CI.
remote_user = admin
# Escalate to root for privileged tasks (the ciuser has passwordless sudo via
# cloud-init). The k3s roles assume they run as root, so become is required.
become = true
become_method = sudo
become_user = root
# Retry failed connections a few times (cloud-init may not be ready immediately).
timeout = 30
retries = 3
# Don't pollute the repo with .retry files.
retry_files_enabled = false
# Use the hashed host key policy to avoid first-connect prompts in automation.
host_key_checking = false
# Prefer the bundled collection/role paths.
collections_path = ./collections
roles_path = ./roles

[ssh_connection]
# Use the runner's SSH private key file directly (no agent forwarding). The key
# path and host-key handling are supplied per-host via ansible_ssh_private_key_file
# and ansible_ssh_common_args in inventory/proxmox.yml (those support Jinja;
# ansible.cfg values do NOT, so we keep this section static). ControlPersist
# keeps connections warm.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = true
